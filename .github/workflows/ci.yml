name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -count=1 ./...

      # Fuzz smoke: 10 s each keeps CI fast while still catching
      # most regressions.
      - name: fuzz id3v2
        run: go test -run=^$ -fuzz=FuzzID3v2Read -fuzztime=10s ./tests/
      - name: fuzz flac blocks
        run: go test -run=^$ -fuzz=FuzzFLACReadBlocks -fuzztime=10s ./tests/
      - name: fuzz flac vorbis
        run: go test -run=^$ -fuzz=FuzzFLACDecodeVorbisComment -fuzztime=10s ./tests/
      - name: fuzz ape decode
        run: go test -run=^$ -fuzz=FuzzAPEDecode -fuzztime=10s ./tests/
      - name: fuzz ape read
        run: go test -run=^$ -fuzz=FuzzAPERead -fuzztime=10s ./tests/
      - name: fuzz mp4
        run: go test -run=^$ -fuzz=FuzzMP4ReadItems -fuzztime=10s ./tests/
      - name: fuzz id3v1
        run: go test -run=^$ -fuzz=FuzzID3v1Decode -fuzztime=10s ./tests/

  build-portability:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: linux
            goarch: 386
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: cross-build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
